---

# Default compose file for development and production.
# Should be used directly in development.
# Automatically loads `docker-compose.override.yml` if it exists.
# No extra steps required.
# Should be used together with `docker/docker-compose.server.yml` in production.

services:
  postgres:
    image: "postgres:17-alpine"
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - postgres-net
    env_file: .env
    healthcheck:
      test: pg_isready
      interval: 5s
      timeout: 30s
      retries: 5
      start_period: 5s

  web:
    <<: &web
      # Image name is changed in production:
      image: "employeebook:dev"
      volumes:
        - django-static:/var/www/django/static
      depends_on:
        postgres:
          condition: service_healthy
      networks:
        - web-net
        - postgres-net
      env_file: .env
    command: python -We -bb backend/manage.py runserver 0.0.0.0:8000


