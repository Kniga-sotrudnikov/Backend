---
name: Deploy Develop
on:  # yamllint disable-line rule:truthy
  push:
    branches: [develop, devops/test-deploy-dev]
  workflow_dispatch:  # Allow manual triggering

env:
  PYTHON_VERSION: '3.12'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout repository code
        uses: actions/checkout@v4

      - name: 2. Create .env file for CI
        run: |
          pip3 install dump-env
          dump-env \
            -t .env.example \
            -p 'CI_' > .env

      - name: 3. Build and run ci.sh
        env:
          DJANGO_ENV: development
        run: |
          docker compose build \
            --progress=plain \
            web
          docker compose run \
            --user=root \
            --rm \
            web ./docker/django/ci.sh


  deploy:
    needs: test
    env:
      CI_DEBUG: False
      CI_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      CI_POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      CI_DJANGO_SUPERUSER_USERNAME: ${{ vars.DJANGO_SUPERUSER_USERNAME }}
      CI_DJANGO_SUPERUSER_EMAIL: ${{ vars.DJANGO_SUPERUSER_EMAIL }}
      CI_DJANGO_SUPERUSER_PASSWORD: ${{ secrets.DJANGO_SUPERUSER_PASSWORD }}
      CI_CADDY_LETSENCRYPT_EMAIL: ${{ vars.CADDY_LETSENCRYPT_EMAIL }}
      CI_CADDY_DOMAIN_NAME: ${{ vars.CADDY_DOMAIN_NAME }}
      CI_ALLOWED_HOSTS: ${{ vars.ALLOWED_HOSTS }}
      CI_CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
      CI_CSRF_TRUSTED_ORIGINS: ${{ vars.CSRF_TRUSTED_ORIGINS }}

    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout repository code
        uses: actions/checkout@v4

      - name: 2. Create .env file for CI
        run: |
          pip3 install dump-env
          dump-env \
            -t .env.example \
            -p 'CI_' > .env

      - name: Copy deploy files to dev server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ vars.SSH_DEPLOY_HOST }}
          username: ${{ secrets.SSH_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          overwrite: true
          source: ".env,backend,docker,docker-compose.yml,requirements.txt,pyproject.toml"
          target: backend
          rm: true

      - name: ssh deploy commands
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SSH_DEPLOY_HOST }}
          username: ${{ secrets.SSH_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          script: |
            mkdir -p ~/frontend/dist
            cd backend
            docker/deploy_dev_server.sh
